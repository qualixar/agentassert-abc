site_name: AgentAssert Documentation
site_url: https://agentassert.com/docs
site_description: Formal behavioral specification and runtime enforcement for autonomous AI agents.
site_author: Varun Pratap Bhardwaj

repo_name: qualixar/agentassert-abc
repo_url: https://github.com/qualixar/agentassert-abc

copyright: Copyright &copy; 2026 Varun Pratap Bhardwaj &amp; Qualixar — Elastic License 2.0

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - ContractSpec DSL: contractspec.md
  - Framework Integrations: integrations.md
  - Domain Contracts: contracts-catalog.md
  - Metrics & Certification: metrics.md
  - Benchmarks: benchmarks.md
  - Examples: examples.md
  - API Reference: api.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qualixar/agentassert-abc
    - icon: fontawesome/solid/globe
      link: https://agentassert.com
    - icon: fontawesome/solid/file-lines
      link: https://arxiv.org/abs/2602.22302
