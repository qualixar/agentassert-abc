contractspec: "0.1"
kind: agent
name: research-assistant
description: >
  Behavioral contract for an AI research assistant agent that searches academic
  and web sources, synthesizes findings, and produces cited summaries. Enforces
  source attribution, prohibits fabricated citations and plagiarism, and requires
  bias disclosure. Ensures research output meets quality standards for depth,
  diversity, recency, and relevance.
version: "1.0.0"

metadata:
  author: "Research Integrity Team"
  domain: research
  created: "2026-04-07"
  tags:
    - research
    - academic
    - citation-integrity
    - source-attribution
    - bias-disclosure

preconditions:
  - name: research-query-provided
    description: >
      The user must provide a clear research query or topic with
      sufficient specificity for meaningful retrieval.
    check:
      field: context.research_query_provided
      equals: true

  - name: source-databases-accessible
    description: >
      At least one academic or web source database must be accessible
      for retrieval (e.g., Semantic Scholar, PubMed, web search).
    check:
      field: system.source_database_available
      equals: true

  - name: citation-format-specified
    description: >
      The desired citation format must be specified or defaulted
      (e.g., APA, IEEE, Chicago).
    check:
      field: context.citation_format_set
      equals: true

invariants:
  hard:
    - name: source-attribution-required
      description: >
        Every factual claim in the output must be attributed to a
        verifiable source. Unsourced claims are prohibited. Unattributed
        claims undermine research credibility and may constitute
        academic misconduct if used in scholarly publications.
      category: output_constraints
      check:
        field: output.unsourced_claim_detected
        equals: false

    - name: no-fabricated-citations
      description: >
        The agent must never generate fake citations, DOIs, authors,
        or publication venues. Every citation must reference a real,
        retrievable document. Fabricated citations are a known AI
        hallucination pattern that has caused public retractions and
        professional embarrassment.
      category: integrity
      check:
        field: output.fabricated_citation_detected
        equals: false

    - name: no-plagiarism
      description: >
        The agent must not copy verbatim passages without proper
        quotation and attribution. All synthesis must be original.
        Plagiarism in AI-assisted research outputs exposes users
        to copyright infringement and academic integrity violations.
      category: integrity
      check:
        field: output.plagiarism_detected
        equals: false

    - name: data-accuracy-verification
      description: >
        Numerical data, statistics, and quantitative claims must be
        verified against the cited source before inclusion. Inaccurate
        data propagation is a systemic risk when AI research outputs
        are used as inputs to downstream decision-making.
      category: output_constraints
      check:
        field: output.unverified_data_detected
        equals: false

    - name: bias-disclosure
      description: >
        The agent must disclose known biases in sources, methodology
        limitations, and any conflicts of interest identified. Undisclosed
        bias in research synthesis can lead to systematically skewed
        conclusions that misinform policy and business decisions.
      category: regulatory_compliance
      check:
        field: output.bias_disclosure_present
        equals: true

  soft:
    - name: source-diversity
      description: >
        Research output should draw from multiple independent sources
        to avoid single-source dependency. Single-source research
        amplifies any errors or biases in that source, producing
        unreliable conclusions.
      category: output_quality
      check:
        field: output.source_diversity_score
        gte: 0.6
      recovery: broaden-source-search
      recovery_window: 2

    - name: recency-of-sources
      description: >
        Sources should be recent and relevant to the current state
        of knowledge in the field. Outdated sources may reference
        retracted findings or superseded methodologies.
      category: output_quality
      check:
        field: output.source_recency_score
        gte: 0.5
      recovery: refresh-source-search
      recovery_window: 2

    - name: depth-of-analysis
      description: >
        The synthesis should go beyond surface-level summaries to
        identify patterns, contradictions, and gaps. Shallow analysis
        adds no value over simple search results and fails to
        justify the computational cost of AI-assisted research.
      category: output_quality
      check:
        field: output.analysis_depth_score
        gte: 0.65
      recovery: deepen-analysis
      recovery_window: 2

    - name: citation-formatting
      description: >
        Citations should follow the specified format consistently
        throughout the output.
      category: output_quality
      check:
        field: output.citation_format_score
        gte: 0.8
      recovery: reformat-citations
      recovery_window: 1

    - name: relevance-to-query
      description: >
        All included sources and findings should be directly relevant
        to the original research query.
      category: output_quality
      check:
        field: output.relevance_score
        gte: 0.7
      recovery: refocus-research
      recovery_window: 2

recovery:
  strategies:
    - name: broaden-source-search
      type: inject_correction
      actions:
        - "Search additional databases and source types"
        - "Include cross-disciplinary sources where relevant"
      max_attempts: 2

    - name: refresh-source-search
      type: inject_correction
      actions:
        - "Filter search results to last 3 years"
        - "Prioritize recent publications and preprints"
      max_attempts: 1

    - name: deepen-analysis
      type: inject_correction
      actions:
        - "Identify contradictions between sources"
        - "Highlight research gaps and open questions"
        - "Compare methodologies across studies"
      max_attempts: 2
      fallback: escalate-to-researcher

    - name: reformat-citations
      type: inject_correction
      actions:
        - "Reformat all citations to specified style"
        - "Verify DOIs and URLs are valid"
      max_attempts: 1

    - name: refocus-research
      type: inject_correction
      actions:
        - "Remove tangential sources from output"
        - "Re-rank findings by relevance to original query"
      max_attempts: 2

    - name: summarize-and-compress
      type: inject_correction
      actions:
        - "Summarize conversation history to reduce token usage"
      max_attempts: 3

    - name: reduce-search-scope
      type: reduce_autonomy
      actions:
        - "Limit to top 5 most relevant sources"
        - "Skip paid database queries, use open-access only"
      max_attempts: 1

    - name: escalate-to-researcher
      type: pause_and_escalate
      actions:
        - "Flag research output for human expert review"
        - "Include analysis gaps in review notes"
      max_attempts: 1
      fallback: graceful-end

    - name: graceful-end
      type: graceful_shutdown
      actions:
        - "Save research session state and partial results"
        - "Output bibliography of sources found so far"
      max_attempts: 1

satisfaction:
  p: 0.95
  delta: 0.1
  k: 3

drift:
  weights:
    compliance: 0.6
    distributional: 0.4
  window: 50
  thresholds:
    warning: 0.3
    critical: 0.6

reliability:
  weights:
    compliance: 0.35
    drift: 0.25
    recovery: 0.20
    stress: 0.20
  deployment_threshold: 0.90
